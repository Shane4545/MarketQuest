# Example task definitions for AI Nation governance V1.
# These are reference-only samples. Copy patterns into agent_workspace/tasks/tasks.yaml
# for your project; do not treat this file as the live task list.

tasks:
  - id: GOV_SMOKE
    title: Governance smoke test
    description: Validate governance scripts without touching application source.
    test_command: python -c "print('governance smoke test pass')"
    lint_command: ""
    ui_required: false
    allowed_files: []
    forbidden_files: []
    required_evidence:
      - test_results.txt
      - lint_results.txt

  - id: DOCS_001
    title: "Add governance quick-start section"
    description: "Add a short quick-start section to AI_NATION_COMMAND.md explaining the V1 smoke-tested workflow."
    test_command: "python scripts/status_report.py"
    lint_command: ""
    ui_required: false
    allowed_files:
      - "AI_NATION_COMMAND.md"
    forbidden_files:
      - ".github/workflows/ci.yml"
      - "scripts/create_worktree.py"
      - "scripts/cleanup_worktree.py"
    required_evidence:
      - test_results.txt
      - lint_results.txt
