  - id: DASHBOARD_001
    title: "Add browser-based Stock Reality dashboard"
    description: "Browser UI (web/index.html, styles.css, app.js): load the imported live market snapshot (via local server or file workflow), display ranked movers and best hindsight performer, starting/target cash inputs, scan period selection, editable ticker universe display, run/load scan result affordances, entry/exit dates and prices, return percentage and multiple, ending cash, distance from target, target achieved, data source and fetch timestamp per result, incomplete-universe warning, and clear distinction between real historical hindsight scan and walk-forward strategy mode. No fabricated production data."
    test_command: "python -c \"from pathlib import Path; required=['web/index.html','web/styles.css','web/app.js']; missing=[p for p in required if not Path(p).exists()]; assert not missing, missing; print('browser dashboard files exist')\""
    lint_command: ""
    ui_required: true
    allowed_files:
      - "web/index.html"
      - "web/styles.css"
      - "web/app.js"
    forbidden_files:
