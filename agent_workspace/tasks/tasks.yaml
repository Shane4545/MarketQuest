  - id: RISK_001
    title: "Add performance stats including target gap and multiples"
    description: "Risk and performance helpers compatible with hindsight outputs: drawdown where applicable, return multiple, win rate, best/worst day, distance to configurable target. Tests for normal and empty inputs."
    test_command: "python -m pytest tests/test_risk.py"
