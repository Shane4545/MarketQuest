  - id: BACKTEST_001
    title: "Add configurable historical paper backtester"
    description: "Walk-forward paper backtester (optional): starting cash default $100, real imported or fixture paths only in tests; no live internet dependency inside Cursor. No broker connections."
    test_command: "python -m pytest tests/test_backtester.py"
    lint_command: ""
