tasks:
  - id: IMPORT_001
    title: "Import and validate live_market_snapshot.json"
    description: "Load reports/live_market_snapshot.json as the source of truth. Validate required top-level fields: scan_mode, entry_day, exit_day, starting_cash, target_cash, required_multiple, fetch_timestamp, universe_description, best_result, ranked_results, limitations. Do not overwrite the research package. Do not invent prices. Do not fetch live internet inside Cursor. Use small fixture JSON in tests only."
    test_command: "python -m pytest tests/test_snapshot_importer.py"
    lint_command: ""
    ui_required: false
    allowed_files:
      - "stock_reality_scanner/snapshot_importer.py"
      - "tests/test_snapshot_importer.py"
    forbidden_files:
      - "scripts/create_worktree.py"
      - "scripts/judge_gate.py"
      - "AI_NATION_COMMAND.md"
      - ".github/workflows/ci.yml"
      - "agent_workspace/tasks/tasks.yaml"
      - "reports/live_market_snapshot.json"
    required_evidence:
      - "test_results.txt"
      - "lint_results.txt"

  - id: CALC_001
    title: "Verify hindsight math from imported snapshot"
    description: "From imported snapshot data: verify/calculate best result alignment, return percentage, return multiple, ending cash from starting cash, target achieved yes/no, distance from target, required multiple, and gap between achieved multiple and required multiple. Must reflect imported figures honestly (no fabrication). No broker connections or trades."
    test_command: "python -m pytest tests/test_hindsight_calculator.py"
    lint_command: ""
    ui_required: false
    allowed_files:
      - "stock_reality_scanner/hindsight_calculator.py"
      - "tests/test_hindsight_calculator.py"
    forbidden_files:
      - "scripts/create_worktree.py"
      - "scripts/judge_gate.py"
      - "AI_NATION_COMMAND.md"
      - ".github/workflows/ci.yml"
      - "agent_workspace/tasks/tasks.yaml"
      - "reports/live_market_snapshot.json"
    required_evidence:
      - "test_results.txt"
      - "lint_results.txt"

  - id: SERVER_001
    title: "Local browser server for dashboard and snapshot JSON"
    description: "Small local Python web server serving the dashboard static assets and reports/live_market_snapshot.json (read-only serve from reports/). No broker connections, no trades, no real-money orders. Include tests for routes and snapshot file handling."
    test_command: "python -m pytest tests/test_web_server.py"
    lint_command: ""
    ui_required: false
    allowed_files:
      - "stock_reality_scanner/web_server.py"
      - "tests/test_web_server.py"
    forbidden_files:
      - "scripts/create_worktree.py"
      - "scripts/judge_gate.py"
      - "AI_NATION_COMMAND.md"
      - "agent_workspace/tasks/tasks.yaml"
      - "reports/live_market_snapshot.json"
    required_evidence:
      - "test_results.txt"
      - "lint_results.txt"

  - id: DASHBOARD_001
    title: "Browser dashboard for live_market_snapshot.json"
    description: "Browser UI (web/index.html, styles.css, app.js) loading the snapshot: scan mode; entry/exit days; starting/target cash; best ticker; entry/exit close; return percentage and multiple; ending cash; target achieved and shortfall; top 25 ranked results; universe description; source links; fetch timestamp; caveats and limitations. Prominent label: Historical hindsight scan — not a future prediction. Do not replace snapshot data with invented prices."
    test_command: "python -c \"from pathlib import Path; required=['web/index.html','web/styles.css','web/app.js']; missing=[p for p in required if not Path(p).exists()]; assert not missing, missing; print('browser dashboard files exist')\""
    lint_command: ""
    ui_required: true
    allowed_files:
      - "web/index.html"
      - "web/styles.css"
      - "web/app.js"
    forbidden_files:
      - "scripts/create_worktree.py"
      - "scripts/judge_gate.py"
      - "AI_NATION_COMMAND.md"
      - "agent_workspace/tasks/tasks.yaml"
      - "reports/live_market_snapshot.json"
    required_evidence:
      - "test_results.txt"
      - "lint_results.txt"
      - "ui_proof.png"

  - id: EVIDENCE_001
    title: "Validation summary export to reports/validation_summary.json"
    description: "Implement validation/export writing reports/validation_summary.json with: input snapshot path, fetch timestamp from snapshot, best ticker, ending cash, target achieved, source count (e.g. ranked rows or distinct sources), limitations count, validation timestamp. Tests use fixtures only; do not mutate reports/live_market_snapshot.json."
    test_command: "python -m pytest tests/test_evidence_export.py"
    lint_command: ""
    ui_required: false
    allowed_files:
      - "stock_reality_scanner/evidence_export.py"
      - "tests/test_evidence_export.py"
      - "reports/validation_summary.json"
    forbidden_files:
      - "scripts/create_worktree.py"
      - "scripts/judge_gate.py"
      - "AI_NATION_COMMAND.md"
      - "agent_workspace/tasks/tasks.yaml"
      - "reports/live_market_snapshot.json"
    required_evidence:
      - "test_results.txt"
      - "lint_results.txt"
