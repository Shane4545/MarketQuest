tasks:
  - id: RESEARCH_PROMPT_001
    title: "Add ChatGPT live market research prompt"
    description: "Create the exact prompt the Human Supreme can paste into ChatGPT (with live web access) to produce a structured JSON or CSV research package for the last two completed trading days. The package must request: ticker symbol, exchange or market, company or instrument name, entry date, exit date, entry close price, exit close price, percent return, return multiple, data source, source link, fetch timestamp, and notes about splits, missing data, or uncertainty. The prompt must instruct saving the result as reports/live_market_snapshot.json. Do not use fictional market data in the prompt artifact itself."
    test_command: "python -m pytest tests/test_research_prompt.py"
    lint_command: ""
    ui_required: false
    allowed_files:
      - "agent_workspace/prompts/RESEARCH_PROMPT_001_live_market_snapshot.md"
      - "tests/test_research_prompt.py"
    forbidden_files:
      - "scripts/create_worktree.py"
      - "scripts/judge_gate.py"
      - "AI_NATION_COMMAND.md"
      - ".github/workflows/ci.yml"
      - "agent_workspace/tasks/tasks.yaml"
    required_evidence:
      - "test_results.txt"
      - "lint_results.txt"

  - id: IMPORT_001
    title: "Add live market snapshot importer"
    description: "Implement importer and validation for reports/live_market_snapshot.json (or the agreed export path) produced by external ChatGPT research. The application must not invent prices: reject or flag rows missing required price fields. Use only small fixture JSON in automated tests. Cursor agents must not rely on live internet for this workflow."
    test_command: "python -m pytest tests/test_live_snapshot_import.py"
    lint_command: ""
    ui_required: false
    allowed_files:
      - "stock_reality_scanner/live_snapshot_import.py"
      - "tests/test_live_snapshot_import.py"
    forbidden_files:
      - "scripts/create_worktree.py"
      - "scripts/judge_gate.py"
      - "AI_NATION_COMMAND.md"
      - ".github/workflows/ci.yml"
      - "agent_workspace/tasks/tasks.yaml"
    required_evidence:
      - "test_results.txt"
      - "lint_results.txt"

  - id: HINDSIGHT_001
    title: "Add real historical hindsight calculation engine"
    description: "From validated imported rows only: compute best real hindsight performer, what configurable starting cash (default $100) would become on that pick, required multiple to reach default target ($100,000,000), achieved multiple, target achieved yes/no, distance from target, ranked top movers, and warning if the universe is incomplete. Label the analytical mode as real historical hindsight scan. Do not claim results without source prices in the import. No broker connections or trades."
    test_command: "python -m pytest tests/test_hindsight_engine.py"
    lint_command: ""
    ui_required: false
    allowed_files:
      - "stock_reality_scanner/hindsight_engine.py"
      - "tests/test_hindsight_engine.py"
    forbidden_files:
      - "scripts/create_worktree.py"
      - "scripts/judge_gate.py"
      - "AI_NATION_COMMAND.md"
      - ".github/workflows/ci.yml"
      - "agent_workspace/tasks/tasks.yaml"
    required_evidence:
      - "test_results.txt"
      - "lint_results.txt"

  - id: STRATEGY_001
    title: "Add walk-forward strategy signal engine"
    description: "Optional secondary mode: signal logic using only information available before each simulated trade (no look-ahead). Distinct from imported hindsight scan. Include tests that prevent look-ahead leakage."
    test_command: "python -m pytest tests/test_strategy.py"
    lint_command: ""
    ui_required: false
    allowed_files:
      - "stock_reality_scanner/strategy.py"
