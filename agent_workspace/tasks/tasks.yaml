  - id: SERVER_001
    title: "Add local browser server"
    description: "Simple local Python web server that serves the Stock Reality Scanner dashboard and static assets in a normal browser. Expose or serve JSON under reports/ including reports/live_market_snapshot.json and other generated scanner outputs. No broker connections, trades, or real-money orders. Include tests for URL path handling and report file loading."
    test_command: "python -m pytest tests/test_web_server.py"
    lint_command: ""
    ui_required: false
    allowed_files:
