      - "scripts/judge_gate.py"
      - "AI_NATION_COMMAND.md"
      - ".github/workflows/ci.yml"
      - "agent_workspace/tasks/tasks.yaml"
    required_evidence:
      - "test_results.txt"
      - "lint_results.txt"
      - "ui_proof.png"

  - id: EVIDENCE_001
    title: "Add evidence export for research snapshot and calculations"
    description: "Export JSON (or agreed format) recording which research snapshot file was used, its fetch timestamp(s), source links from the import, derived calculations, mode label (real historical hindsight scan vs walk-forward), and incomplete-universe warnings. Tests use small local fixtures only."
    test_command: "python -m pytest tests/test_evidence_export.py"
