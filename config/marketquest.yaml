# MarketQuest — real-market paper competition
max_symbols: 25
starting_cash_usd: 100000
long_only: true
refresh_interval_minutes: 15
stale_threshold_minutes: 20
use_volatile_seed: false

composite_weights:
  ml: 0.25
  gap: 0.35
  rvol: 0.30
  sentiment: 0.10

news:
  lookback_hours: 48
  earnings_keywords:
    - earnings
    - eps
    - revenue
  financing_keywords:
    - offering
    - dilution
    - secondary
